
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табло вокзала • Нибиру-Сити</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: white;
        }

        .rzd-header {
            background: #0a0a0a;
            border-bottom: 6px solid #ffd700;
        }

        .rzd-table th {
            background: #1a1a1a;
            color: #ffd700;
            font-weight: 600;
            text-transform: uppercase;
        }

        .train-row {
            transition: all 0.4s ease;
        }

        .train-row.past {
            opacity: 0.65;
            background: #111111;
        }

        .time {
            font-family: 'Courier New', monospace;
            font-size: 1.35rem;
            font-weight: bold;
        }

        .status-delay {
            color: #ff4444;
        }

        .status-boarding {
            color: #ffcc00;
        }

        .status-on-time {
            color: #00ff88;
        }

        .status-rescheduled {
            color: #ff8800;
            font-weight: bold;
        }

        .day-btn {
            transition: all 0.3s;
        }

        .day-btn.active {
            background-color: #ffd700;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body class="min-h-screen">

<div class="max-w-7xl mx-auto">

    <div class="rzd-header py-5 px-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="text-4xl font-bold">НИБИРУ</div>

            <div>
                <h1 class="text-3xl font-bold tracking-wider">
                    ВОКЗАЛ НИБИРУ-СИТИ
                </h1>

                <p class="text-yellow-400 text-lg">
                    Общее табло — Реальное время
                </p>
            </div>
        </div>

        <div class="text-right">
            <div class="text-5xl font-mono font-bold" id="current-time">
                14:35
            </div>

            <div class="text-sm text-gray-300" id="current-date">
                08 мая 2026
            </div>
        </div>
    </div>

    <div class="bg-[#0a0a0a] py-3 px-8 flex gap-3 border-b border-yellow-400">
        <button onclick="setDay(0)" class="day-btn active px-6 py-2 rounded-lg" id="btn-0">
            Сегодня
        </button>

        <button onclick="setDay(1)" class="day-btn px-6 py-2 rounded-lg" id="btn-1">
            Завтра
        </button>

        <button onclick="setDay(2)" class="day-btn px-6 py-2 rounded-lg" id="btn-2">
            Послезавтра
        </button>
    </div>

    <div class="p-6 overflow-x-auto">
        <table class="w-full rzd-table">
            <thead>
                <tr class="text-left border-b-2 border-yellow-400">
                    <th class="py-4 px-6">№</th>
                    <th class="py-4 px-6">Маршрут</th>
                    <th class="py-4 px-6">Время</th>
                    <th class="py-4 px-6">Тип</th>
                    <th class="py-4 px-6">Осталось</th>
                    <th class="py-4 px-6">Путь</th>
                    <th class="py-4 px-6">Статус</th>
                </tr>
            </thead>

            <tbody id="train-table"></tbody>
        </table>
    </div>
</div>

<script>

let currentDayOffset = 0;

// ЗАГРУЗКА СОХРАНЁННЫХ СТАТУСОВ
let dayStatuses = JSON.parse(localStorage.getItem('nibiruStatuses')) || {};

function saveStatuses() {
    localStorage.setItem('nibiruStatuses', JSON.stringify(dayStatuses));
}

function getTrainsForDay(dayOffset) {

    let trains = [

        { id: 1, number: "001П", route: "Нибиру-Сити → Перниград", time: "09:37", type: "dep", platform: "1" },
        { id: 2, number: "002П", route: "Нибиру-Сити → Перниград", time: "15:42", type: "dep", platform: "1" },
        { id: 3, number: "015И", route: "Нибиру-Сити → Бордерсити", time: "08:12", type: "dep", platform: "3" },
        { id: 4, number: "016И", route: "Нибиру-Сити → Бордерсити", time: "14:27", type: "dep", platform: "3" },
        { id: 5, number: "105М", route: "Нибиру-Сити → Максимлин", time: "13:55", type: "dep", platform: "4" },
        { id: 6, number: "109И", route: "Нибиру-Сити → Дыркаленд", time: "14:19", type: "dep", platform: "9" },
        { id: 7, number: "071В", route: "Нибиру-Сити → Бьоркпилс", time: "07:58", type: "dep", platform: "6" },
        { id: 8, number: "073В", route: "Нибиру-Сити → Бьоркпилс", time: "20:12", type: "dep", platform: "6" },
        { id: 9, number: "202Ж", route: "Нибиру-Сити → Жудас", time: "09:22", type: "dep", platform: "5" },
        { id: 10, number: "204Ж", route: "Нибиру-Сити → Жудас", time: "16:05", type: "dep", platform: "5" },

        { id: 11, number: "101П", route: "Перниград → Нибиру-Сити", time: "11:20", type: "arr", platform: "1" },
        { id: 12, number: "102П", route: "Перниград → Нибиру-Сити", time: "17:55", type: "arr", platform: "1" },
        { id: 13, number: "017И", route: "Бордерсити → Нибиру-Сити", time: "12:40", type: "arr", platform: "3" },
        { id: 14, number: "018И", route: "Бордерсити → Нибиру-Сити", time: "19:15", type: "arr", platform: "3" },
        { id: 15, number: "104М", route: "Максимлин → Нибиру-Сити", time: "11:33", type: "arr", platform: "4" },
        { id: 16, number: "125М", route: "Максимлин → Нибиру-Сити", time: "16:08", type: "arr", platform: "2" },
        { id: 17, number: "023Д", route: "Дыркаленд → Нибиру-Сити", time: "10:45", type: "arr", platform: "2" },
        { id: 18, number: "024Д", route: "Дыркаленд → Нибиру-Сити", time: "18:30", type: "arr", platform: "2" },
        { id: 19, number: "072В", route: "Бьоркпилс → Нибиру-Сити", time: "15:47", type: "arr", platform: "7" },
        { id: 20, number: "203Ж", route: "Жудас → Нибиру-Сити", time: "12:40", type: "arr", platform: "5" }
    ];

    return trains;
}

function isPast(time) {

    if (currentDayOffset > 0) {
        return false;
    }

    const now = new Date();

    const [h, m] = time.split(':').map(Number);

    const trainTime = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        h,
        m
    );

    return now > trainTime;
}

function getTimeLeft(time) {

    if (currentDayOffset > 0) {
        return '—';
    }

    const now = new Date();

    const [h, m] = time.split(':').map(Number);

    const trainTime = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        h,
        m
    );

    const diff = trainTime - now;

    const mins = Math.floor(diff / 60000);

    if (mins <= 0) {
        return 'Завершён';
    }

    if (mins < 60) {
        return `${mins} мин`;
    }

    return `${Math.floor(mins / 60)} ч ${mins % 60} мин`;
}

// СОХРАНЯЕМ СТАТУСЫ
function simulateReschedule(currentTrains) {

    let changed = false;

    currentTrains.forEach(train => {

        const key = `${train.id}-${currentDayOffset}`;

        if (!dayStatuses[key]) {

            dayStatuses[key] = Math.random() < 0.16
                ? 'rescheduled'
                : 'on-time';

            changed = true;
        }
    });

    if (changed) {
        saveStatuses();
    }
}

function getStatusHTML(train) {

    const key = `${train.id}-${currentDayOffset}`;

    const status = dayStatuses[key] || 'on-time';

    if (isPast(train.time)) {
        return `<span class="text-gray-400">Завершён</span>`;
    }

    if (status === 'rescheduled') {
        return `<span class="status-rescheduled">ПЕРЕНЕСЁН</span>`;
    }

    return `<span class="status-on-time">По расписанию</span>`;
}

function renderTable() {

    const trains = getTrainsForDay(currentDayOffset);

    simulateReschedule(trains);

    const tbody = document.getElementById('train-table');

    tbody.innerHTML = '';

    const sorted = [...trains].sort((a, b) => a.time.localeCompare(b.time));

    sorted.forEach(train => {

        const timeLeft = getTimeLeft(train.time);

        const past = isPast(train.time);

        const row = document.createElement('tr');

        row.className = `train-row border-b border-gray-800 ${past ? 'past' : ''}`;

        row.innerHTML = `
            <td class="py-5 px-6 font-mono text-2xl font-bold">
                ${train.number}
            </td>

            <td class="py-5 px-6">
                ${train.route}
            </td>

            <td class="py-5 px-6 time">
                ${train.time}
            </td>

            <td class="py-5 px-6 text-center">
                <span class="${train.type === 'dep' ? 'text-green-400' : 'text-blue-400'} font-bold text-xl">
                    ${train.type === 'dep' ? '→' : '←'}
                </span>
            </td>

            <td class="py-5 px-6 time text-yellow-300">
                ${timeLeft}
            </td>

            <td class="py-5 px-6">
                <div class="w-10 h-10 bg-yellow-400 text-black rounded flex items-center justify-center text-2xl font-bold mx-auto">
                    ${train.platform}
                </div>
            </td>

            <td class="py-5 px-6">
                ${getStatusHTML(train)}
            </td>
        `;

        tbody.appendChild(row);
    });
}

function setDay(day) {

    currentDayOffset = day;

    for (let i = 0; i <= 2; i++) {

        document
            .getElementById(`btn-${i}`)
            .classList.toggle('active', i === day);
    }

    updateDate();

    renderTable();
}

function updateClock() {

    setInterval(() => {

        const now = new Date();

        const str =
            now.getHours().toString().padStart(2, '0')
            + ':' +
            now.getMinutes().toString().padStart(2, '0');

        document.getElementById('current-time').textContent = str;

    }, 1000);
}

function updateDate() {

    const date = new Date();

    date.setDate(date.getDate() + currentDayOffset);

    const options = {
        weekday: 'long',
        day: '2-digit',
        month: 'long'
    };

    document.getElementById('current-date').textContent =
        date.toLocaleDateString('ru-RU', options);
}

window.onload = () => {

    renderTable();

    updateClock();

    updateDate();

    setInterval(renderTable, 8000);
};

</script>

<div class="text-center py-6 text-gray-400 text-sm">
    Общее табло вокзала Нибиру-Сити • Информация обновляется автоматически
</div>

</body>
</html>
